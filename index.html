<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#152238">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192.png">
    <title>RhinoPlan — Planificador Quirúrgico</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        overflow: hidden;
        touch-action: pan-x pan-y pinch-zoom;
        /* Tipografia del sistema: sans-serif limpia en cada plataforma
           (SF en iPad/Mac, Segoe UI en Windows) sin descargar webfonts.
           Se declara aqui a proposito: antes la app heredaba la serif por
           defecto del navegador. App.jsx usa fontFamily:"inherit", asi que
           todos los controles la toman de aqui. */
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
      }
    </script>
  </body>
</html>
